[id]
run_id = "Run 3"

# Data management
[data]
folder = "C:/Users/thiba/OneDrive/Documents/Fluid_Flower/code_DarSIA_perso/raw_data"
baseline = "DSC22892.JPG"
results = "C:/Users/thiba/OneDrive/Documents/Fluid_Flower/code_DarSIA_perso/results"

# Selection of baseline images
[data.path.baseline]
paths = ["DSC22892.JPG", "DSC22887.JPG"]

# Experimental metadata
[protocols]
injection = ["./data/protocol_exp_3.xlsx", "injection"]
imaging = ["./data/protocol_exp_3.xlsx", "imaging"]
pressure_temperature = [
    "./data/protocol_exp_3.xlsx",
    "pressure_temperature",
]

# Calibration of color paths
[color_paths]
mode = "manual"
calibration_scope = "single_label"
target_labels = [6]
ignore_labels = [1, 2]       # water and top layer
reference_label = 5          # black - yellow transition.
data = ["calibration"]
baseline = "baseline"
rois = ["down"] #"calibration1", "calibration2"]
ignore_baseline_spectrum = "baseline"
histogram_weighting = "threshold"
resolution = 51
num_segments = 3
threshold_baseline = 0.0
threshold_calibration = 0.0 # 1e-4 # Needs tuning (1e-5 too low).


# Calibration of color signal to mass
[color_to_mass]
data = ["phase5"]

# Denoising using a simple averaging filter.
[restoration]
method = "volume_average"
[restoration.options]
rev_size = 0.01 # meters

